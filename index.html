<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nexus Zone</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Orbitron', sans-serif;
background-color: #0f0f0f;
color: #e0e0e0;
min-height: 100vh;
display: flex;
flex-direction: column;
position: relative;
touch-action: manipulation;
overflow-x: hidden;
}

/* --- SOLUCIÓN PARA 1366x768 SIN ARRUINAR EL DISEÑO --- */
@media (min-width: 1025px) and (max-height: 800px) {
    .main-container {
        zoom: 0.85; /* Escala todo el contenido un 15% hacia abajo */
        padding-top: 0 !important;
        padding-bottom: 0 !important;
    }
    header { padding: 0.8rem !important; }
    h1 { font-size: 2rem !important; }
    body { overflow-y: hidden; } /* Eliminamos el scroll */
}
/* ---------------------------------------------------- */

.background-grid {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
background-image:
linear-gradient(rgba(120, 120, 120, 0.15) 1px, transparent 1px),
linear-gradient(90deg, rgba(120, 120, 120, 0.15) 1px, transparent 1px);
background-size: 40px 40px;
animation: gridRandomMove 30s linear infinite;
pointer-events: none;
}
@keyframes gridRandomMove {
0% { background-position: 0 0; }
25% { background-position: 15px 10px; }
50% { background-position: 0 20px; }
75% { background-position: -15px 10px; }
100% { background-position: 0 0; }
}
header {
background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
padding: 1.5rem;
text-align: center;
position: relative;
z-index: 10;
}
h1 {
font-family: 'Orbitron', sans-serif;
font-weight: 900;
font-size: clamp(1.5rem, 4vw, 3rem);
letter-spacing: 3px;
text-transform: uppercase;
background: linear-gradient(to right, #bd00ff, #00ff41);
-webkit-background-clip: text;
background-clip: text;
-webkit-text-fill-color: transparent;
text-fill-color: transparent;
text-shadow: 0 0 10px rgba(189, 0, 255, 0.5);
animation: glow 2s ease-in-out infinite alternate;
margin: 0;
display: inline-block;
}
@keyframes glow {
from { text-shadow: 0 0 10px rgba(189, 0, 255, 0.5); }
to { text-shadow: 0 0 20px rgba(189, 0, 255, 0.8), 0 0 30px rgba(0, 255, 65, 0.6); }
}
.led-strip-top,
.led-strip-bottom {
height: 8px;
background: #8b8b8b;
position: relative;
z-index: 10;
transition: background 0.05s ease, box-shadow 0.05s ease;
box-shadow: 0 0 0 rgba(139, 139, 139, 0);
}
.main-container {
display: flex;
flex: 1;
padding: clamp(1rem, 3vw, 2rem);
gap: clamp(1rem, 2vw, 2rem);
position: relative;
z-index: 1;
}
.player-section, .dj-section {
flex: 1;
background: transparent;
border-radius: 10px;
padding: clamp(1rem, 2vw, 2rem);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
}
.section-title {
font-family: 'Orbitron', sans-serif;
font-weight: 900;
font-size: clamp(1.2rem, 2vw, 1.5rem);
margin-bottom: 1.5rem;
text-align: center;
text-transform: uppercase;
letter-spacing: 2px;
}
.player-title, .dj-title { color: #bd00ff; padding-bottom: 0.5rem; }

/* CASSETTE PLAYER ORIGINAL */
.cassette-player {
width: 95%;
max-width: 575px;
height: auto;
min-height: 340px;
background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
border: 3px solid #8b8b8b;
border-radius: 20px;
padding: 1.5rem;
position: relative;
overflow: hidden;
display: flex;
flex-direction: column;
}
.cassette-player::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0;
height: 8px;
background: linear-gradient(90deg, #00ff41, #bd00ff, #00ff41);
opacity: 0.8;
}
.album-art-bg {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
background-size: cover;
background-position: center;
opacity: 0.4;
filter: blur(3px);
z-index: 1;
}
.cassette-content {
position: relative;
z-index: 2;
height: 100%;
display: flex;
flex-direction: column;
justify-content: space-between;
gap: 15px;
}
.song-info {
width: 100%;
text-align: center;
margin-bottom: 5px;
color: #00ff41;
font-family: 'Orbitron', sans-serif;
font-weight: 900;
font-size: clamp(1.2rem, 2vw, 1.5rem);
text-shadow: 0 0 10px rgba(0, 255, 65, 0.8), 0 0 20px rgba(189, 0, 255, 0.7);
min-height: 30px;
display: flex;
align-items: center;
justify-content: center;
padding: 0 5px;
letter-spacing: 1.5px;
}

/* EFECTO GLITCH ORIGINAL */
:root { --pink-neon: #bd00ff; --green-neon: #00ff41; }
.cyber-glitch { position: relative; display: inline-block; max-width: 100%; word-break: break-word; text-shadow: 0 0 8px rgba(189, 0, 255, 0.9), 0 0 15px rgba(0, 255, 65, 0.7); animation: title-glow 2.5s ease-in-out infinite alternate; }
.cyber-glitch::before, .cyber-glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; text-align: center; pointer-events: none; }
.cyber-glitch::before { color: var(--pink-neon); clip-path: inset(2px 0 11px 0); animation: glitch-shift-1 2.0s infinite; z-index: -1; opacity: 0.85; }
.cyber-glitch::after { color: var(--green-neon); clip-path: inset(10px 0 3px 0); animation: glitch-shift-2 2.7s infinite; z-index: -2; opacity: 0.85; }

@keyframes glitch-shift-1 {
0%, 100% { clip-path: inset(2px 0 11px 0); transform: translate(0, 0) rotate(0); }
25% { clip-path: inset(6px 0 6px 0); transform: translate(3px, -2px); }
50% { clip-path: inset(3px 0 10px 0); transform: translate(-2px, 1px); }
}
@keyframes glitch-shift-2 {
0%, 100% { clip-path: inset(10px 0 3px 0); transform: translate(0, 0); }
50% { clip-path: inset(6px 0 7px 0); transform: translate(3px, -3px); }
}
@keyframes title-glow {
from { text-shadow: 0 0 8px rgba(189, 0, 255, 0.9), 0 0 15px rgba(0, 255, 65, 0.7); }
to { text-shadow: 0 0 12px rgba(189, 0, 255, 1), 0 0 25px rgba(0, 255, 65, 0.9), 0 0 35px rgba(189, 0, 255, 0.8); }
}

.cassette-tapes {
display: flex;
justify-content: center;
align-items: center;
height: 140px;
margin-top: 5px;
gap: 25px;
}
.tape-reel {
width: 85px; height: 85px;
border: 4px solid #8b8b8b;
border-radius: 50%;
background: radial-gradient(circle at center, #333 0%, #1a1a1a 60%);
animation: subtleSpin 15s linear infinite;
}
@keyframes subtleSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.cassette-center {
width: 170px; height: 118px;
background: #1a1a1a;
border: 3px solid #8b8b8b;
border-radius: 8px;
display: flex;
flex-direction: column;
justify-content: space-between;
}
.play-btn {
width: 85px; height: 33px;
background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
border: 3px solid #00ff41;
color: #00ff41;
cursor: pointer;
font-family: 'Orbitron';
font-weight: 900;
}

.equalizer-container {
width: 100%; height: 28px;
display: flex; gap: 4px; padding: 0 5px;
align-items: flex-end;
}
.bar { flex: 1; height: 2px; background: linear-gradient(to top, #00ff41, #bd00ff); }

.volume-control {
width: 100%; max-width: 402px;
margin: 0 auto;
background: rgba(20, 20, 20, 0.85);
padding: 12px;
border-radius: 10px;
}
.volume-label { display: flex; justify-content: space-between; color: #00ff41; font-weight: 900; }
.volume-slider { width: 100%; height: 14px; cursor: pointer; }

/* DJ PROFILE ORIGINAL */
#dj_profile {
display: flex; flex-direction: column; align-items: center;
width: 100%; max-width: 412px;
aspect-ratio: 1 / 1;
border-radius: 50%;
animation: dj-breathing 3s ease-in-out infinite;
box-shadow: -15px 0 25px rgba(189, 0, 255, 0.6), 15px 0 25px rgba(0, 255, 65, 0.6);
}
@keyframes dj-breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
#dj_profile img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #8b8b8b; object-fit: cover; }

footer {
background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
padding: 1rem;
text-align: center;
border-top: 1px solid #333;
}
.social-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.8rem; }
.social-link { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #00ff41, #bd00ff); text-decoration: none; color: white; display: flex; align-items: center; justify-content: center; font-weight: 900; }
.copyright { color: #666; font-size: 0.7rem; margin-top: 0.5rem; }

/* CHAT ORIGINAL */
.chat-panel { position: fixed; top: 0; right: -50vw; width: 50vw; height: 100vh; background: #0a0a0a; border-left: 3px solid #bd00ff; z-index: 1000; transition: right 0.4s ease; display: flex; flex-direction: column; }
.chat-panel.visible { right: 0; }
.chat-header { padding: 1rem; background: #111; border-bottom: 2px solid #bd00ff; display: flex; justify-content: space-between; align-items: center; }
#chat-iframe { flex: 1; border: none; }
</style>
</head>
<body>
<div class="background-grid"></div>
<header>
    <h1>Nexus Zone</h1>
</header>
<div class="led-strip-top"></div>

<div class="main-container">
    <section class="player-section">
        <h2 class="section-title player-title">Reproductor</h2>
        <div class="cassette-player">
            <div class="album-art-bg" id="album-art-bg"></div>
            <div class="cassette-content">
                <div class="song-info">
                    <div id="sonic_title" class="cyber-glitch" data-text="Cargando...">Cargando...</div>
                </div>
                <div class="cassette-tapes">
                    <div class="tape-reel" id="tape-left"></div>
                    <div class="cassette-center">
                        <div style="display:flex; justify-content:center; align-items:center; flex:1;">
                            <button class="play-btn" id="play-pause-btn">▶</button>
                        </div>
                        <div class="equalizer-container" id="equalizer">
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                        </div>
                    </div>
                    <div class="tape-reel" id="tape-right"></div>
                </div>
                <div class="volume-control">
                    <div class="volume-label"><span>Volumen</span><span id="vol-val">100%</span></div>
                    <input type="range" id="volume" class="volume-slider" min="0" max="1" step="0.1" value="1">
                </div>
            </div>
        </div>
    </section>

    <section class="dj-section">
        <h2 class="section-title dj-title">Emite: <span id="sonic_dj" class="cyber-glitch" data-text="DJ">DJ</span></h2>
        <div id="dj_profile">
            <img src="https://via.placeholder.com/400" id="dj_image">
        </div>
    </section>
</div>

<footer>
    <div class="social-links">
        <a href="#" class="social-link">T</a><a href="#" class="social-link">Tk</a><a href="#" class="social-link">S</a><a href="#" class="social-link" id="chat-btn">C</a>
    </div>
    <div class="copyright">NEXUS ZONE | DOBBY DS | 2024</div>
</footer>

<div class="chat-panel" id="chat-panel">
    <div class="chat-header"><h3>💬 Chat</h3><button id="chat-close" style="color:#bd00ff; background:none; border:none; font-size:1.5rem; cursor:pointer;">×</button></div>
    <iframe id="chat-iframe" src="https://chat.chatzona.org/index.html#nick=&channel=Nexus_Zone"></iframe>
</div>

<script>
// SCRIPTS ORIGINALES RESTAURADOS
const audio = new Audio('https://sonic.sistemahost.es/8008/stream');
const playPauseBtn = document.getElementById('play-pause-btn');
const volumeSlider = document.getElementById('volume');
const bars = document.querySelectorAll('.bar');

playPauseBtn.onclick = () => {
    if (audio.paused) {
        audio.play();
        playPauseBtn.innerHTML = '||';
    } else {
        audio.pause();
        playPauseBtn.innerHTML = '▶';
    }
};

volumeSlider.oninput = (e) => {
    audio.volume = e.target.value;
    document.getElementById('vol-val').innerText = Math.round(e.target.value * 100) + '%';
};

// Lógica de visualizador simple
setInterval(() => {
    if (!audio.paused) {
        bars.forEach(bar => {
            bar.style.height = Math.random() * 25 + 2 + 'px';
        });
    } else {
        bars.forEach(bar => bar.style.height = '2px');
    }
}, 100);

// Chat
const chatBtn = document.getElementById('chat-btn');
const chatPanel = document.getElementById('chat-panel');
const chatClose = document.getElementById('chat-close');

chatBtn.onclick = () => chatPanel.classList.add('visible');
chatClose.onclick = () => chatPanel.classList.remove('visible');
</script>
</body>
</html>

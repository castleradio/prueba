<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nexus Zone</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Orbitron', sans-serif;
background-color: #0f0f0f;
color: #e0e0e0;
height: 100vh; /* Cambiado de min-height a height fijo */
display: flex;
flex-direction: column;
position: relative;
touch-action: manipulation;
overflow: hidden; /* Evita el scroll global */
}
/* ============================================ */
/* CUADRÍCULA DE FONDO EN MOVIMIENTO */
/* ============================================ */
.background-grid {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
background-image:
linear-gradient(rgba(120, 120, 120, 0.15) 1px, transparent 1px),
linear-gradient(90deg, rgba(120, 120, 120, 0.15) 1px, transparent 1px);
background-size: 40px 40px;
animation: gridRandomMove 30s linear infinite;
pointer-events: none;
}
@keyframes gridRandomMove {
0% { background-position: 0 0; }
25% { background-position: 15px 10px; }
50% { background-position: 0 20px; }
75% { background-position: -15px 10px; }
100% { background-position: 0 0; }
}
/* ============================================ */
/* Cabecera */
header {
background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
padding: 0.8rem; /* Reducido de 1.5rem */
text-align: center;
position: relative;
z-index: 10;
}
/* Título con degradado original */
h1 {
font-family: 'Orbitron', sans-serif;
font-weight: 900;
font-size: clamp(1.2rem, 3vw, 2.2rem); /* Ajustado */
letter-spacing: 3px;
text-transform: uppercase;
background: linear-gradient(to right, #bd00ff, #00ff41);
-webkit-background-clip: text;
background-clip: text;
-webkit-text-fill-color: transparent;
text-fill-color: transparent;
text-shadow: 0 0 10px rgba(189, 0, 255, 0.5);
animation: glow 2s ease-in-out infinite alternate;
margin: 0;
display: inline-block;
}
@keyframes glow {
from { text-shadow: 0 0 10px rgba(189, 0, 255, 0.5); }
to { text-shadow: 0 0 20px rgba(189, 0, 255, 0.8), 0 0 30px rgba(0, 255, 65, 0.6); }
}
/* Tira LED debajo de la cabecera */
.led-strip-top,
.led-strip-bottom {
height: 6px; /* Reducido de 8px */
background: #8b8b8b;
position: relative;
z-index: 10;
transition: background 0.05s ease, box-shadow 0.05s ease;
}
/* Contenido principal */
.main-container {
display: flex;
flex: 1;
padding: 0.5rem 1rem; /* Mucho más compacto */
gap: 1rem;
position: relative;
z-index: 1;
align-items: center; /* Centrado vertical */
overflow: hidden;
}
.player-section, .dj-section {
flex: 1;
background: transparent;
border-radius: 10px;
padding: 0.5rem;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
}
.section-title {
font-family: 'Orbitron', sans-serif;
font-weight: 900;
font-size: clamp(1rem, 1.5vw, 1.3rem); /* Reducido */
margin-bottom: 0.8rem; /* Reducido */
text-align: center;
text-transform: uppercase;
letter-spacing: 2px;
}
.player-title, .dj-title {
color: #bd00ff;
padding-bottom: 0.3rem;
}
/* Cassette Player Optimizado */
.cassette-player {
width: 95%;
max-width: 500px; /* Reducido de 575px */
height: auto;
min-height: 280px; /* Reducido de 340px */
background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
border: 3px solid #8b8b8b;
border-radius: 20px;
padding: 1rem;
position: relative;
overflow: hidden;
display: flex;
flex-direction: column;
}
.cassette-player::before {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
height: 6px;
background: linear-gradient(90deg, #00ff41, #bd00ff, #00ff41);
opacity: 0.8;
}
/* Fondo difuminado de la portada */
.album-art-bg {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
background-size: cover;
background-position: center;
opacity: 0.4;
filter: blur(3px);
z-index: 1;
}
.cassette-content {
position: relative;
z-index: 2;
height: 100%;
display: flex;
flex-direction: column;
justify-content: space-between;
gap: 10px;
}
/* Song Info */
.song-info {
width: 100%;
text-align: center;
color: #00ff41;
font-family: 'Orbitron', sans-serif;
font-weight: 900;
font-size: clamp(1rem, 1.5vw, 1.2rem); /* Reducido */
text-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
min-height: 25px;
display: flex;
align-items: center;
justify-content: center;
padding: 0 5px;
}
/* GLITCH CYBERPUNK ORIGINAL (Mantenido igual) */
:root { --pink-neon: #bd00ff; --green-neon: #00ff41; }
.cyber-glitch { position: relative; display: inline-block; max-width: 100%; word-break: break-word; animation: title-glow 2.5s ease-in-out infinite alternate; }
.cyber-glitch::before, .cyber-glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
.cyber-glitch::before { color: var(--pink-neon); clip-path: inset(2px 0 11px 0); animation: glitch-shift-1 2.0s infinite; z-index: -1; opacity: 0.85; }
.cyber-glitch::after { color: var(--green-neon); clip-path: inset(10px 0 3px 0); animation: glitch-shift-2 2.7s infinite; z-index: -2; opacity: 0.85; }
@keyframes title-glow { from { text-shadow: 0 0 8px rgba(189, 0, 255, 0.9), 0 0 15px rgba(0, 255, 65, 0.7); } to { text-shadow: 0 0 12px rgba(189, 0, 255, 1), 0 0 25px rgba(0, 255, 65, 0.9); } }
/* Carretes y centro */
.cassette-tapes {
display: flex;
justify-content: center;
align-items: center;
height: 110px; /* Reducido de 140px */
margin-top: 5px;
gap: 20px;
}
.tape-reel {
width: 70px; height: 70px; /* Reducido de 85px */
border: 4px solid #8b8b8b;
border-radius: 50%;
background: radial-gradient(circle at center, #333 0%, #1a1a1a 60%);
position: relative;
animation: subtleSpin 15s linear infinite;
}
.tape-reel::before { content: ''; position: absolute; width: 50px; height: 50px; border: 3px solid #8b8b8b; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
.tape-reel span { position: absolute; width: 6px; height: 20px; background: #8b8b8b; left: 50%; top: 50%; margin-left: -3px; margin-top: -10px; }
.tape-reel span:nth-child(1) { transform: rotate(45deg) translate(0, -15px); }
.tape-reel span:nth-child(2) { transform: rotate(135deg) translate(0, -15px); }
.tape-reel span:nth-child(3) { transform: rotate(225deg) translate(0, -15px); }
.tape-reel span:nth-child(4) { transform: rotate(315deg) translate(0, -15px); }

.cassette-center {
width: 140px; height: 100px; /* Reducido de 170x118 */
background: #1a1a1a;
border: 3px solid #8b8b8b;
border-radius: 8px;
display: flex;
flex-direction: column;
justify-content: space-between;
overflow: hidden;
}
.play-btn { width: 75px; height: 30px; font-size: 1.1rem; cursor: pointer; background: #1a1a1a; border: 2px solid #00ff41; color: #00ff41; font-family: 'Orbitron'; }

/* Visualizador */
.equalizer-container { width: 100%; height: 22px; display: flex; gap: 3px; padding: 0 5px; align-items: flex-end; }
.bar { flex: 1; height: 2px; background: #00ff41; transition: height 0.05s ease; }

/* Volumen */
.volume-control { width: 100%; max-width: 350px; background: rgba(20,20,20,0.8); padding: 8px; border-radius: 8px; }
.volume-label { font-size: 0.9rem; margin-bottom: 5px; display: flex; justify-content: space-between; color: #00ff41; }
.volume-slider { width: 100%; height: 10px; cursor: pointer; }

/* DJ Profile Optimizado para altura */
#dj_profile {
display: flex;
flex-direction: column;
align-items: center;
width: 100%;
max-width: 300px; /* Reducido de 412px */
aspect-ratio: 1 / 1;
border-radius: 50%;
animation: dj-breathing 3s ease-in-out infinite;
box-shadow: -10px 0 20px rgba(189, 0, 255, 0.4), 10px 0 20px rgba(0, 255, 65, 0.4);
position: relative;
}
#dj_profile img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #8b8b8b; object-fit: cover; }

/* Footer */
footer {
background: #0d0d0d;
padding: 0.6rem;
text-align: center;
z-index: 10;
border-top: 1px solid #333;
}
.social-links { display: flex; justify-content: center; gap: 1rem; margin-bottom: 0.4rem; }
.social-link { width: 32px; height: 32px; font-size: 0.9rem; text-decoration: none; background: linear-gradient(135deg, #00ff41, #bd00ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
.copyright { font-size: 0.65rem; color: #666; }

/* MEDIA QUERY ESPECÍFICA PARA PANTALLAS BAJAS (COMO 1366x768) */
@media (max-height: 780px) {
    header { padding: 0.5rem; }
    h1 { font-size: 1.5rem; }
    .main-container { padding: 0.3rem 1rem; }
    .cassette-player { max-width: 420px; min-height: 250px; }
    .cassette-tapes { height: 90px; }
    .tape-reel { width: 60px; height: 60px; }
    .cassette-center { width: 120px; height: 85px; }
    #dj_profile { max-width: 250px; }
    .section-title { margin-bottom: 0.4rem; }
}

/* CHAT PANEL (Mantenido igual) */
.chat-panel { position: fixed; top: 0; right: -50vw; width: 50vw; height: 100vh; background: #0a0a0a; border-left: 3px solid #bd00ff; z-index: 1000; transition: right 0.4s ease; display: flex; flex-direction: column; }
.chat-panel.visible { right: 0; }
.chat-header { padding: 0.8rem; background: #111; display: flex; justify-content: space-between; align-items: center; }
#chat-iframe { flex: 1; border: none; }
.chat-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); visibility: hidden; z-index: 999; }
.chat-overlay.active { visibility: visible; }

/* Animaciones Glitch faltantes */
@keyframes glitch-shift-1 { 0%, 100% { clip-path: inset(2px 0 11px 0); transform: translate(0,0); } 50% { clip-path: inset(5px 0 1px 0); transform: translate(-2px, 2px); } }
@keyframes glitch-shift-2 { 0%, 100% { clip-path: inset(10px 0 3px 0); transform: translate(0,0); } 50% { clip-path: inset(2px 0 15px 0); transform: translate(2px, -2px); } }
@keyframes dj-breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
@keyframes subtleSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes fastSpin { from { transform: rotate(0deg); } to { transform: rotate(720deg); } }
</style>
</head>
<body>
<div class="background-grid"></div>
<script id='sonic_js' data-port='8008' src='https://sonic.sistemahost.es/cp/widgets.js?r=122'></script>
<header>
    <h1>Nexus Zone</h1>
</header>
<div class="led-strip-top" id="led-top"></div>

<div class="main-container">
    <section class="player-section">
        <h2 class="section-title player-title">Reproductor</h2>
        <div class="cassette-player">
            <div class="album-art-bg" id="album-art-bg"></div>
            <div class="cassette-content">
                <div class="song-info">
                    <div id='sonic_title' class="cyber-glitch" data-text="Cargando...">Cargando...</div>
                </div>
                <div class="cassette-tapes">
                    <div class="tape-reel" id="tape-left"><span></span><span></span><span></span><span></span></div>
                    <div class="cassette-center">
                        <div style="display:flex; justify-content:center; align-items:center; flex:1;">
                            <button class="play-btn" id="play-pause-btn">▶</button>
                        </div>
                        <div class="equalizer-container" id="equalizer">
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                        </div>
                    </div>
                    <div class="tape-reel" id="tape-right"><span></span><span></span><span></span><span></span></div>
                </div>
                <div class="volume-control">
                    <div class="volume-label"><span>Volumen</span><span id="vol-val">100%</span></div>
                    <input type="range" id="volume" class="volume-slider" min="0" max="1" step="0.1" value="1">
                </div>
            </div>
        </div>
    </section>

    <section class="dj-section">
        <h2 class="section-title dj-title">Emite: <span id='sonic_dj' class="cyber-glitch" data-text="DJ">DJ</span></h2>
        <div id='dj_profile'></div>
    </section>
</div>

<div class="led-strip-bottom" id="led-bottom"></div>

<footer>
    <div class="social-links">
        <a href="#" class="social-link">T</a><a href="#" class="social-link">Tk</a><a href="#" class="social-link">S</a><a href="#" class="social-link" id="chat-btn">C</a>
    </div>
    <div class="copyright">NEXUS ZONE | DOBBY DS | 2024</div>
</footer>

<div class="chat-panel" id="chat-panel">
    <div class="chat-header"><h3>💬 Chat</h3><button id="chat-close" style="background:none; border:1px solid #bd00ff; color:#bd00ff; cursor:pointer;">X</button></div>
    <iframe id="chat-iframe" src="https://chat.chatzona.org/index.html#nick=&channel=Nexus_Zone"></iframe>
</div>
<div class="chat-overlay" id="chat-overlay"></div>

<audio id="radio-player" crossorigin="anonymous" src="https://sonic.sistemahost.es/8008/stream"></audio>

<script>
// LÓGICA DE AUDIO Y VISUALIZADOR ORIGINAL (RESTAURADA)
const audio = document.getElementById('radio-player');
const playPauseBtn = document.getElementById('play-pause-btn');
const tapeLeft = document.getElementById('tape-left');
const tapeRight = document.getElementById('tape-right');
const volumeSlider = document.getElementById('volume');
const equalizerBars = document.querySelectorAll('.bar');

let isPlaying = false;
let audioContext, analyser, dataArray;

function initVisualizer() {
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaElementSource(audio);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 64;
        source.connect(analyser);
        analyser.connect(audioContext.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        animateVisualizer();
    }
}

function animateVisualizer() {
    if (!isPlaying) {
        equalizerBars.forEach(bar => bar.style.height = '2px');
        return;
    }
    requestAnimationFrame(animateVisualizer);
    analyser.getByteFrequencyData(dataArray);
    equalizerBars.forEach((bar, i) => {
        const height = (dataArray[i] / 255) * 20;
        bar.style.height = Math.max(2, height) + 'px';
    });
}

playPauseBtn.onclick = () => {
    if (audio.paused) {
        audio.play().catch(e => console.log("Error al reproducir"));
        playPauseBtn.innerHTML = '||';
        tapeLeft.style.animation = 'fastSpin 2s linear infinite';
        tapeRight.style.animation = 'fastSpin 2s linear infinite';
        isPlaying = true;
        initVisualizer();
    } else {
        audio.pause();
        playPauseBtn.innerHTML = '▶';
        tapeLeft.style.animation = 'subtleSpin 15s linear infinite';
        tapeRight.style.animation = 'subtleSpin 15s linear infinite';
        isPlaying = false;
    }
};

volumeSlider.oninput = (e) => {
    audio.volume = e.target.value;
    document.getElementById('vol-val').innerText = Math.round(e.target.value * 100) + '%';
};

// Lógica de Chat
const chatBtn = document.getElementById('chat-btn');
const chatPanel = document.getElementById('chat-panel');
const chatClose = document.getElementById('chat-close');
const chatOverlay = document.getElementById('chat-overlay');

chatBtn.onclick = () => { chatPanel.classList.add('visible'); chatOverlay.classList.add('active'); };
chatClose.onclick = () => { chatPanel.classList.remove('visible'); chatOverlay.classList.remove('active'); };
chatOverlay.onclick = () => { chatPanel.classList.remove('visible'); chatOverlay.classList.remove('active'); };

// Función para actualizar arte de fondo (Sonic API)
function updateArt() {
    const art = document.querySelector('#sonic_art_full img');
    if(art) document.getElementById('album-art-bg').style.backgroundImage = `url(${art.src})`;
}
setInterval(updateArt, 5000);
</script>
</body>
</html>
